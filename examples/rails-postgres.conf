# ─────────────────────────────────────────────────────────────────────────────
# rails-postgres.conf — a Rails monolith + jsbundling/vite, lane-isolated.
#
#   COPY to `hyperlane.conf` at the repo root (gitignored) and edit. This file is
#   SOURCED as bash. See hyperlane.conf.example for the full annotated schema.
#
# The point of this example: a Rails app shares ONE Postgres server across every
# checkout, so two clones running at once will fight over the same database —
# migrations from lane `a` clobber fixtures in lane `b`. We fix that by giving
# each lane its OWN database name in the env hook. Ports are handled by hyperlane;
# the database split is the part you have to author.
# ─────────────────────────────────────────────────────────────────────────────

# WHERE THE PARALLEL CHECKOUTS LIVE.
HYPERLANE_ROOT="$HOME/Sites/myapp-multi"

# THE PRIMARY CHECKOUT — owns lane 0 (default, un-offset ports).
HYPERLANE_PRIMARY="$HOME/Sites/myapp"

# CLONE NAME PREFIX. Clones are "<prefix>-<label>": myapp-a, myapp-wip-billing, …
HYPERLANE_PREFIX="myapp"

# SERVICES — "name:portbase". On lane L each listens on (portbase + L).
HYPERLANE_SERVICES=(
  "web:3000"     # `rails server`  → primary :3000, lane a :3001, lane b :3002 …
  "vite:3036"    # vite dev server → primary :3036, lane a :3037 …  (jsbundling)
)

# `lane open` opens the Rails app in a browser.
HYPERLANE_OPEN_SERVICE="web"

# ── LAUNCH HOOKS ─────────────────────────────────────────────────────────────
# Each runs with the lane env already sourced: $LANE_CLONE and the <NAME>_PORT
# vars ($WEB_PORT, $VITE_PORT) are in scope. End with `exec` so signals/pids are
# clean and Ctrl-C actually stops the server instead of the wrapping shell.

hyperlane_launch_web() {
  # Bind to the lane's web port. RAILS_ENV/DATABASE_URL come from the env hook
  # below (already sourced into this shell via .lane.env), so the server boots
  # against THIS lane's database, not the primary's.
  cd "$LANE_CLONE" && exec bin/rails server -p "$WEB_PORT" -b 127.0.0.1
}

hyperlane_launch_vite() {
  # The asset bundler must run on its own lane port too, otherwise lane `a`'s
  # Rails would proxy HMR to lane 0's vite. `--port` overrides whatever is baked
  # into vite.config — pass it explicitly so the wrapper can't win.
  cd "$LANE_CLONE" && exec bin/vite dev --port "$VITE_PORT" --host 127.0.0.1
}

# ── PER-LANE ENV HOOK ────────────────────────────────────────────────────────
# Emitted into <checkout>/.lane.env and sourced before every launch. LANE,
# LANE_OFFSET, and LANE_CLONE are in scope. This is where the database split
# lives — each lane gets a distinct DB name so parallel clones can't corrupt
# each other's schema or seed data. Secrets belong here too (file is gitignored).
hyperlane_env_hook() {
  cat <<EOF
# Per-lane Postgres database. Primary uses "myapp_lane_primary"; lane a uses
# "myapp_lane_a", etc. Create it once with: bin/rails db:create db:schema:load
# (or let your setup script do it). Same host/user, different database — cheap
# isolation without a second Postgres server.
export DATABASE_URL="postgres://localhost:5432/myapp_lane_${LANE}"

# Plain development mode in every lane — these are all dev checkouts.
export RAILS_ENV="development"

# Point vite's HMR/asset host at THIS lane's vite port so the browser connects
# to the right bundler when several lanes are up at once.
export VITE_RUBY_PORT="${VITE_PORT}"
EOF
}
