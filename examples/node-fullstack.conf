# ─────────────────────────────────────────────────────────────────────────────
# node-fullstack.conf — a pnpm monorepo (api + web + worker), lane-isolated.
#
#   COPY to `hyperlane.conf` at the repo root (gitignored) and edit. This file is
#   SOURCED as bash. See hyperlane.conf.example for the full annotated schema.
#
# The point of this example: a monorepo's per-package `dev` scripts usually
# HARDCODE a port (`vite --port 3000`, `nodemon ... PORT=8080`). If you launch two
# lanes through those scripts, both grab the default port and the second one
# either crashes ("address in use") or — worse — silently binds nothing and your
# lane `a` browser talks to lane 0's server. So we DO NOT call the package's `dev`
# script here. We invoke the dev server binary directly and pass the lane port,
# which always wins over the script's default. That bypass is the whole trick.
# ─────────────────────────────────────────────────────────────────────────────

# WHERE THE PARALLEL CHECKOUTS LIVE.
HYPERLANE_ROOT="$HOME/Sites/myapp-multi"

# THE PRIMARY CHECKOUT — owns lane 0 (default, un-offset ports).
HYPERLANE_PRIMARY="$HOME/Sites/myapp"

# CLONE NAME PREFIX. Clones are "<prefix>-<label>": myapp-a, myapp-feat-search, …
HYPERLANE_PREFIX="myapp"

# SERVICES — "name:portbase". On lane L each listens on (portbase + L).
HYPERLANE_SERVICES=(
  "api:8080"     # backend (node/express) → primary :8080, lane a :8081 …
  "web:3000"     # frontend (vite)        → primary :3000, lane a :3001 …
  "worker:9000"  # background worker      → primary :9000, lane a :9001 …
)

# `lane open` opens the web frontend.
HYPERLANE_OPEN_SERVICE="web"

# ── LAUNCH HOOKS ─────────────────────────────────────────────────────────────
# Each runs with the lane env sourced: $LANE_CLONE and $API_PORT / $WEB_PORT /
# $WORKER_PORT are in scope. `cd` into the workspace package and run the dev
# server binary DIRECTLY on the lane port — NOT `pnpm dev`, whose script likely
# hardcodes the default port (see the header). End with `exec` for clean signals.

hyperlane_launch_api() {
  # Run tsx/node against the entrypoint and let the app read $PORT (set in the
  # env hook). We pass the binary directly rather than `pnpm --filter api dev`
  # so no package script can re-pin the port out from under us.
  cd "$LANE_CLONE/packages/api" && exec ./node_modules/.bin/tsx watch src/index.ts
}

hyperlane_launch_web() {
  # `vite --port "$WEB_PORT"` overrides vite.config's `server.port`. This is the
  # canonical fix for the "two lanes, one port" footgun called out up top.
  cd "$LANE_CLONE/packages/web" && exec ./node_modules/.bin/vite --port "$WEB_PORT" --host 127.0.0.1
}

hyperlane_launch_worker() {
  # The worker exposes a health/metrics port too; bind it to the lane port so
  # `lane doctor`/`verify` can see it and lanes don't collide on metrics.
  cd "$LANE_CLONE/packages/worker" && exec ./node_modules/.bin/tsx watch src/worker.ts
}

# ── PER-LANE ENV HOOK ────────────────────────────────────────────────────────
# Emitted into <checkout>/.lane.env. The dev servers read these (rather than
# CLI flags) for app-level wiring. LANE / LANE_OFFSET / LANE_CLONE are in scope.
# Secrets go here (gitignored).
hyperlane_env_hook() {
  cat <<EOF
# Node apps conventionally read PORT — make it THIS lane's api port so an
# express \`app.listen(process.env.PORT)\` lands on the right lane.
export PORT="${API_PORT}"

# Vite reads VITE_PORT in some setups; mirror the lane's web port for parity
# with the --port flag in the launch hook.
export VITE_PORT="${WEB_PORT}"

# Point the frontend at THIS lane's api, so lane a's web calls lane a's api.
export VITE_API_BASE_URL="http://127.0.0.1:${API_PORT}"

# Per-lane Redis logical database (db 0 = primary, db <offset> = this lane) so
# parallel workers don't drain each other's queues. Same server, different db.
export REDIS_URL="redis://127.0.0.1:6379/${LANE_OFFSET}"

# Let the worker's own health/metrics endpoint bind to its lane port.
export WORKER_PORT="${WORKER_PORT}"
EOF
}
