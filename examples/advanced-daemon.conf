# ─────────────────────────────────────────────────────────────────────────────
# advanced-daemon.conf — backend + frontend + a stateful background daemon.
#
#   COPY to `hyperlane.conf` at the repo root (gitignored) and edit. This file is
#   SOURCED as bash. See hyperlane.conf.example for the full annotated schema.
#
# This is the FULL-POWER example — it exercises every hook hyperlane offers:
#
#   • launch hooks    — start each service on its lane port (api, web, daemon)
#   • setup hook      — clone a per-lane on-disk daemon HOME the first time
#   • env hook        — CORS allowlist + a shared encryption key from a shared file
#   • verify hook     — curl each lane's health endpoint AND assert the daemon's
#                       call-home is wired to THIS lane's backend (not the primary)
#
# It is the genericized distillation of a real 12-clone production setup whose two
# worst recurring failures were: (1) a clone squatting the primary's default ports
# and silently stealing traffic, and (2) a daemon whose persistent home still
# pointed its "call-home" URL at lane 0's backend, so a clone's daemon reported
# into the wrong stack. Ports solve (1); the verify hook below catches (2).
#
# Everything here is a GENERIC PLACEHOLDER — no real hostnames, no real secrets,
# no company names. localhost / myapp / mydaemon only.
# ─────────────────────────────────────────────────────────────────────────────

# WHERE THE PARALLEL CHECKOUTS LIVE.
HYPERLANE_ROOT="$HOME/Sites/myapp-multi"

# THE PRIMARY CHECKOUT — owns lane 0 (default, un-offset ports).
HYPERLANE_PRIMARY="$HOME/Sites/myapp"

# CLONE NAME PREFIX. Single letters a–z get fixed offsets (a=1 … l=12); a 12-clone
# fleet is exactly a..l. Multi-char labels (myapp-staging) get the next free ≥27.
HYPERLANE_PREFIX="myapp"

# SERVICES — "name:portbase". On lane L each listens on (portbase + L).
HYPERLANE_SERVICES=(
  "api:8080"       # backend          → primary :8080, lane a :8081, … lane l :8092
  "web:3000"       # frontend         → primary :3000, lane a :3001, …
  "daemon:18800"   # background daemon → primary :18800, lane a :18801, …
)

# `lane open` opens the frontend.
HYPERLANE_OPEN_SERVICE="web"

# ── LAUNCH HOOKS ─────────────────────────────────────────────────────────────
# Run with the lane env sourced ($LANE_CLONE, $API_PORT, $WEB_PORT, $DAEMON_PORT,
# plus everything the env hook exports). End each with `exec`.

hyperlane_launch_api() {
  # The backend reads CORS_ALLOWED_ORIGINS / SHARED_ENCRYPTION_KEY from the env
  # hook below, so it boots already trusting THIS lane's frontend.
  cd "$LANE_CLONE/api" && exec ./bin/api-server --port "$API_PORT" --host 127.0.0.1
}

hyperlane_launch_web() {
  # Frontend on the lane port; --port wins over any config default (the classic
  # "two lanes, one port" footgun).
  cd "$LANE_CLONE/web" && exec ./node_modules/.bin/vite --port "$WEB_PORT" --host 127.0.0.1
}

hyperlane_launch_daemon() {
  # The daemon is STATEFUL: it runs against a per-lane home dir (created by the
  # setup hook) and is told, via --backend-url, to call home to THIS lane's api.
  # Passing it on the CLI guarantees the running process points at the right
  # backend even if a stale URL is persisted inside the home dir.
  local home="$HOME/.mydaemon-$LANE"
  cd "$LANE_CLONE" && exec ./bin/mydaemon \
    --home "$home" \
    --port "$DAEMON_PORT" \
    --backend-url "http://127.0.0.1:$API_PORT"
}

# ── SETUP HOOK (one-time, per lane) ──────────────────────────────────────────
# Runs on `lane setup <c>` AFTER .lane.env is written. Here it gives each lane its
# own copy of the daemon's home directory so two lanes' daemons never share state
# (sockets, sqlite, cached creds). MUST be idempotent — `lane setup` may re-run.
hyperlane_setup_hook() {
  local seed="$HOME/.mydaemon"          # the primary/seed home to clone from
  local home="$HOME/.mydaemon-$LANE"    # this lane's private home

  if [ ! -d "$home" ]; then
    if [ -d "$seed" ]; then
      cp -R "$seed" "$home"
      echo "  [+] created per-lane daemon home: $home (from $seed)"
    else
      # Fail loudly rather than silently launching against a missing home —
      # a silent skip here is how a lane ends up sharing the primary's state.
      echo "  [X] seed daemon home not found at $seed — run the daemon once in" >&2
      echo "      the primary to create it, then re-run \`lane setup\`." >&2
      return 1
    fi
  fi

  # Scrub any persisted backend URL from the COPIED home so the daemon can't
  # boot against lane 0's api if the --backend-url flag is ever dropped. The
  # launch hook re-supplies the correct per-lane URL on every start.
  local cfg="$home/config.json"
  [ -f "$cfg" ] && sed -i.bak 's#"backend_url":[^,}]*#"backend_url":""#' "$cfg" && rm -f "$cfg.bak"
}

# ── ENV HOOK (per lane) ──────────────────────────────────────────────────────
# Emitted into <checkout>/.lane.env. LANE / LANE_OFFSET / LANE_CLONE in scope.
hyperlane_env_hook() {
  # Read a SHARED encryption key from a gitignored shared file (the `.local-*`
  # pattern is ignored by .gitignore). Every lane shares ONE key so envelopes
  # encrypted by the primary stay readable in a clone — generating a per-lane key
  # instead silently corrupts any cross-lane encrypted data. Create it once with:
  #   openssl rand -hex 32 > "$HOME/Sites/myapp-multi/.local-shared-key"
  local key_file="$HYPERLANE_ROOT/.local-shared-key"
  local shared_key=""
  [ -f "$key_file" ] && shared_key="$(cat "$key_file")"

  cat <<EOF
# Allow THIS lane's frontend (and the primary's, for convenience) to call the
# backend. Built from LANE_OFFSET so lane a's api trusts :3001, lane b's :3002 …
export CORS_ALLOWED_ORIGINS="http://localhost:$((3000 + LANE_OFFSET)),http://127.0.0.1:$((3000 + LANE_OFFSET))"

# Shared symmetric key across all lanes — DO NOT make this per-lane (see above).
export SHARED_ENCRYPTION_KEY="${shared_key}"

# Frontend → backend base URL for THIS lane.
export VITE_API_BASE_URL="http://127.0.0.1:${API_PORT}"

# Where the daemon should call home — THIS lane's backend, never the primary's.
export DAEMON_BACKEND_URL="http://127.0.0.1:${API_PORT}"
EOF
}

# ── VERIFY HOOK (read-only isolation assertions) ─────────────────────────────
# Runs on `lane verify <c>` after hyperlane's built-in port-ownership checks.
# These are the assertions specific to THIS stack. Return non-zero on any gap so
# the lane is flagged. Strictly read-only — never mutate state in a verify hook.
hyperlane_verify_hook() {
  local rc=0
  local api_port="$API_PORT"
  local web_port="$WEB_PORT"
  local daemon_port="$DAEMON_PORT"

  # 1) Each service answers a health check ON ITS LANE PORT. If a port answers
  #    but with the wrong stack, the call-home check (3) catches that.
  curl -sf "http://127.0.0.1:${api_port}/health" >/dev/null \
    || { echo "  [X] api health failed on lane port ${api_port}"; rc=1; }
  curl -sf "http://127.0.0.1:${web_port}/" >/dev/null \
    || { echo "  [X] web not responding on lane port ${web_port}"; rc=1; }
  curl -sf "http://127.0.0.1:${daemon_port}/health" >/dev/null \
    || { echo "  [X] daemon health failed on lane port ${daemon_port}"; rc=1; }

  # 2) The daemon reports its OWN view of the world. Ask it which backend it is
  #    calling home to and assert it is THIS lane's api — the real-world failure
  #    this whole example was built to catch (a clone's daemon pointed at lane 0).
  local reported
  reported="$(curl -sf "http://127.0.0.1:${daemon_port}/status" 2>/dev/null \
    | grep -o '"backend_url":"[^"]*"' | head -n1)"
  if [ -n "$reported" ] && ! printf '%s' "$reported" | grep -q ":${api_port}\""; then
    echo "  [X] daemon call-home is NOT this lane's backend (:${api_port})"
    echo "      reported: ${reported}"
    rc=1
  fi

  return "$rc"
}
